<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El clon de wordle (Juego de palabras)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container ">
        <h1 class="text-center mt-5">Personajes de Rick And Morty</h1>

        <div class="m-5 d-flex justify-content-evenly"  >
            <select id="genero" class="form-select m-2" aria-label="Default select example" style="width: 25rem;">
                <option value="todos"  selected>Todos los generos</option>
                <option value="Male">Masculino</option>
                <option value="Female">Femenino</option>
            </select>

            <input id="busqueda" type="text" class="form-control m-2" placeholder="Busque su personaje favorito">

            <select id="especies" class="form-select m-2" aria-label="Default select example" style="width: 25rem;">
                <option value="todos"  selected>Todas las especies</option>
                <option value="Alien">Alien</option>
                <option value="Human">Humano</option>
            </select>
        </div>
    
            

        <div class="personajes">

            <div class="row ">
                <div class="col">
                    <div class="card" style="width: 18rem;">
                        <img src="..." class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Nombre</h5>
                            <p class="card-text">Especie</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
